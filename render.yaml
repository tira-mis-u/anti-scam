services:
  - type: web
    name: anti-scam-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_DATABASE
        value: antiscam
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ENABLE_ADMIN_UI
        value: "true"
      - key: ENABLE_ADMIN_API
        value: "true"
      - key: ADMIN_SESSION_TTL_MS
        value: "28800000"
